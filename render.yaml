services:
  - type: web
    name: timeln-server
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node --experimental-sqlite src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: timeln-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false

databases:
  - name: timeln-db
    databaseName: timeln
    user: timeln
    region: frankfurt
    plan: free
